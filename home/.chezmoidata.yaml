name: Gary Jarrel
email: gary@jarrel.com.au
githubUser: garyj
langs:
  python: "3.14"
  mongodb: "8.2"

# Pinned Tier-3 CLI tools (installed via mise; audited before pinning). The
# `# renovate:` annotations let Renovate open version-bump PRs; see renovate.json.
# Versions are stored bare (no leading v); Renovate normalizes on write-back.
tools:
  ast_grep: "0.42.3"   # renovate: datasource=github-releases depName=ast-grep/ast-grep
  worktrunk: "0.53.0"  # renovate: datasource=github-releases depName=max-sixty/worktrunk
  dust: "1.2.4"        # renovate: datasource=github-releases depName=bootandy/dust

# Pinned git refs for chezmoi externals (zsh-users cut no releases, so github-tags).
externals:
  zsh_syntax_highlighting: "0.8.0"  # renovate: datasource=github-tags depName=zsh-users/zsh-syntax-highlighting
  zsh_autosuggestions: "0.7.1"      # renovate: datasource=github-tags depName=zsh-users/zsh-autosuggestions

# GUI apps shipped as .deb on GitHub releases (no apt repo). Pinned by version +
# sha256; the installer verifies the download before apt installs it.
deb_apps:
  handy:                             # cjpais/Handy, offline speech-to-text
    version: "0.8.3"
    sha256: "a1b355e7f55b9fc6d81cdeb5a30e44fdb4e0c492aad4fb7f023d212cf6ec3a33"

# Single static binaries pinned from GitHub releases (verified by sha256 before
# install to /usr/local/bin). Kept off apt to track upstream; off mise so the
# systemd backup timer finds them on the default PATH. Bump version+sha together.
github_bins:
  restic:                            # restic/restic, backup engine
    version: "0.19.0"
    sha256: "13176fe6d89d4357947a2cd107218ab2873a5f9d8e1ac2d4cd1c8e07e6839c21"
