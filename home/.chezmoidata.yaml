name: Gary Jarrel
email: gary@jarrel.com.au
githubUser: garyj
langs:
  python: "3.14"
  mongodb: "8.2"

# Pinned Tier-3 CLI tools (installed via mise; audited before pinning). The
# `# renovate:` annotations let Renovate open version-bump PRs; see renovate.json.
# Versions are stored bare (no leading v); Renovate normalizes on write-back.
tools:
  mise: "2026.7.7"     # renovate: datasource=github-releases depName=jdx/mise
  ast_grep: "0.44.1"   # renovate: datasource=github-releases depName=ast-grep/ast-grep
  worktrunk: "0.68.0"  # renovate: datasource=github-releases depName=max-sixty/worktrunk
  dust: "1.2.4"        # renovate: datasource=github-releases depName=bootandy/dust
  apm: "0.26.0"        # renovate: datasource=github-releases depName=microsoft/apm
  prek: "0.4.10"        # renovate: datasource=github-releases depName=j178/prek
  rtk: "0.43.0"        # renovate: datasource=github-releases depName=rtk-ai/rtk
  # These two are pinned so the binary (mise) and its agent skill
  # (.chezmoiexternal.toml.tmpl) install from the same release, like worktrunk.
  agent_browser: "0.32.1"  # renovate: datasource=github-releases depName=vercel-labs/agent-browser
  sentry: "0.38.0"         # renovate: datasource=github-releases depName=getsentry/cli

# AI coding agents, all installed via mise and pinned so Renovate opens bump PRs
# that the release-notes summarizer TLDRs before you merge (see renovate.json).
# aqua backends verify checksum + attestation; gemini and pi are npm-only.
# codex tags are `rust-v0.x.y`; a packageRule in renovate.json strips the prefix.
coding_agents:
  claude: "2.1.214"     # renovate: datasource=github-releases depName=anthropics/claude-code
  codex: "0.144.6"      # renovate: datasource=github-releases depName=openai/codex
  copilot: "1.0.72"     # renovate: datasource=github-releases depName=github/copilot-cli
  opencode: "1.18.4"   # renovate: datasource=github-releases depName=anomalyco/opencode
  gemini: "0.51.0"      # renovate: datasource=npm depName=@google/gemini-cli
  pi: "0.80.10"          # renovate: datasource=npm depName=@earendil-works/pi-coding-agent

# Pinned git refs for chezmoi externals (zsh-users cut no releases, so github-tags).
externals:
  zsh_syntax_highlighting: "0.8.0"  # renovate: datasource=github-tags depName=zsh-users/zsh-syntax-highlighting
  zsh_autosuggestions: "0.7.1"      # renovate: datasource=github-tags depName=zsh-users/zsh-autosuggestions

# GUI apps shipped as .deb on GitHub releases (no apt repo). Version-only pin;
# Renovate proposes updates (see renovate.json).
deb_apps:
  handy:  # cjpais/Handy, offline speech-to-text
    version: "0.9.3"  # renovate: datasource=github-releases depName=cjpais/Handy

# Single static binaries pinned from GitHub releases, installed to /usr/local/bin.
# Kept off apt to track upstream; off mise so the systemd backup timer finds them
# on the default PATH. Renovate proposes version updates (see renovate.json).
github_bins:
  restic:  # restic/restic, backup engine
    version: "0.19.1"  # renovate: datasource=github-releases depName=restic/restic
