# https://github.com/jefftriplett/dotfiles/blob/main/home/.config/starship.toml
add_newline = false
command_timeout = 1000
scan_timeout = 1000

[aws]
disabled = false
style = "bold #ffb86c"

# [aws.region_aliases]
# us-east-1 = "va"

[battery]
disabled = true

[character]
error_symbol = "[✗](bold #ff5555)"
success_symbol = "[➜](bold #50fa7b)"
# dracula style...
# error_symbol = "[λ](bold #ff5555)"
# success_symbol = "[λ](bold #50fa7b)"

[cmd_duration]
style = "bold #f1fa8c"

[directory]
style = "#50fa7b"
before_repo_root_style = "dimmed #50fa7b"
repo_root_style = "bold #bd93f9"
truncate_to_repo = false
truncation_length = 1
fish_style_pwd_dir_length = 1

# [direnv]
# disabled = true

# [docker_context]
# # disabled = false
# # only_with_files = false
# symbol = "🐳 "

[git_branch]
style = "#ff79c6"
symbol = " "

[git_status]
style = "bold #ff5555"

[hostname]
style = "bold #bd93f9"

[kubernetes]
disabled = true

[nodejs]
disabled = false

[package]
disabled = true

[username]
format = "[$user]($style) on "
style_user = "bold #8be9fd"
