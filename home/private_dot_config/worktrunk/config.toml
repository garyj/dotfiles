# Worktrunk user config. Project hooks go in each repo's .config/wt.toml.

worktree-path = "{{ repo_path }}/.worktrees/{{ branch | sanitize }}"

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

# Ordered pipeline: copy must finish before direnv allow (.envrc is gitignored,
# so it only arrives via copy-ignored).
[[post-start]]
copy = "wt step copy-ignored"

[[post-start]]
direnv = "if [ -f .envrc ]; then direnv allow; fi"
