name: Security

# Static security audit of the GitHub Actions workflows themselves (zizmor):
# catches template injection, over-broad permissions, credential persistence,
# and unpinned actions. Findings surface in the PR and in code scanning.
on:
  pull_request:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload findings to code scanning (free on public repos)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
