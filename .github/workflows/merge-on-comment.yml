name: Merge on comment

# Merge a PR by replying to its notification email: GitHub turns the reply
# into a PR comment, and this workflow squash-merges when that comment starts
# with /merge. Email clients put the typed reply before the quoted thread, so
# startsWith on the body matches the first line. Only comments authored by
# garyj qualify; quoted text or other commenters can't trigger a merge.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write # perform the merge
  pull-requests: write # post the failure comment

jobs:
  merge:
    if: >-
      github.event.issue.pull_request
      && github.event.comment.user.login == 'garyj'
      && startsWith(github.event.comment.body, '/merge')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
    steps:
      # Squash keeps master linear and uses the PR title (Renovate's
      # "update: bump X to Y") as the commit subject; merge commits are
      # disabled in the repo settings anyway.
      - run: gh pr merge "$PR_NUMBER" --squash
      # Surface failures (conflicts, already merged) as a PR comment so the
      # result comes back by email instead of silence.
      - if: failure()
        run: >-
          gh pr comment "$PR_NUMBER" --body
          "/merge failed - see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
