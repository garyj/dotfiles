name: Summarize Renovate release notes

# Runs only on PRs carrying the `deps-summary` label. Renovate auto-applies it
# (renovate.json -> labels), so its PRs are summarized automatically; slap the
# label on any other PR by hand to summon a summary. Triggers on `opened` and
# `labeled`; the per-PR concurrency group collapses that pair into one run, and
# the script updates one comment in place.
on:
  pull_request:
    types: [opened, labeled]

permissions:
  contents: read # checkout + read the context file
  pull-requests: write # post the summary comment

# Collapse the opened+labeled pair (and rapid re-labels) into one run per PR.
concurrency:
  group: renovate-summary-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  summarize:
    if: contains(github.event.pull_request.labels.*.name, 'deps-summary')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the token in .git/config
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv run scripts/summarize_release.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          # Optional private profile (repo variable, not committed). Empty if unset,
          # in which case the script falls back to release-summary-context.md.
          RELEASE_SUMMARY_CONTEXT: ${{ vars.RELEASE_SUMMARY_CONTEXT }}
          # CLAUDE_MODEL: claude-opus-4-8   # default is claude-sonnet-4-6; set this for sharper (pricier) summaries
